<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LendEasy Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;color:#1e2f3e;min-height:100vh}

    /* ── LOGIN ── */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a1f2e,#0f5b8c)}
    .login-box{background:white;border-radius:28px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 30px 60px rgba(0,0,0,.3);text-align:center}
    .login-logo{font-size:2rem;font-weight:800;background:linear-gradient(120deg,#0f5b8c,#2b9b7a);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:.3rem}
    .login-sub{color:#7a9ab0;font-size:.9rem;margin-bottom:2rem}
    .login-box input{width:100%;padding:.85rem 1rem;border:1.5px solid #e0eaf0;border-radius:16px;font-size:1rem;font-family:inherit;margin-bottom:1rem;transition:.2s}
    .login-box input:focus{border-color:#0f5b8c;outline:none;box-shadow:0 0 0 3px rgba(15,91,140,.1)}
    .login-btn{width:100%;background:linear-gradient(95deg,#0f5b8c,#2b9b7a);color:white;border:none;padding:1rem;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s}
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(15,91,140,.3)}
    .login-error{color:#dc2626;font-size:.85rem;margin-top:.5rem;display:none}

    /* ── LAYOUT ── */
    #adminApp{display:none}
    .sidebar{position:fixed;top:0;left:0;width:230px;height:100vh;background:linear-gradient(180deg,#0a1f2e,#0d3550);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:.3rem;z-index:100;overflow-y:auto}
    .sidebar-logo{font-size:1.25rem;font-weight:800;color:white;padding:.5rem .8rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:.5rem;display:flex;align-items:center;gap:8px}
    .sidebar-logo span{color:#2b9b7a}
    .nav-item{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-radius:14px;color:#a0bfd0;font-weight:600;cursor:pointer;transition:.2s;font-size:.9rem;border:none;background:none;width:100%;text-align:left}
    .nav-item:hover{background:rgba(255,255,255,.08);color:white}
    .nav-item.active{background:rgba(43,155,122,.2);color:#2b9b7a}
    .nav-item i{width:18px;text-align:center;font-size:.9rem}
    .badge{background:#ef4444;color:white;font-size:.68rem;padding:.12rem .45rem;border-radius:40px;margin-left:auto;font-weight:700;min-width:20px;text-align:center}
    .badge.green{background:#16a34a}
    .logout-btn{margin-top:auto;display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-radius:14px;color:#f87171;font-weight:600;cursor:pointer;background:none;border:none;width:100%;font-size:.9rem}
    .logout-btn:hover{background:rgba(248,113,113,.1)}
    .main-area{margin-left:230px;padding:1.8rem;min-height:100vh}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .page-title{font-size:1.5rem;font-weight:800;color:#0f2d42}
    .live-dot{display:flex;align-items:center;gap:.5rem;color:#5a7a8e;font-size:.85rem;background:white;padding:.4rem .9rem;border-radius:40px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .live-dot::before{content:'';width:8px;height:8px;border-radius:50%;background:#2b9b7a;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ── STATS ── */
    .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:1.8rem}
    .stat-card{background:white;border-radius:18px;padding:1.2rem 1rem;box-shadow:0 2px 10px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:.3rem;border-top:4px solid transparent;transition:.2s}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.1)}
    .stat-card.blue{border-top-color:#0f5b8c}
    .stat-card.yellow{border-top-color:#f59e0b}
    .stat-card.green{border-top-color:#16a34a}
    .stat-card.red{border-top-color:#dc2626}
    .stat-card.purple{border-top-color:#7c3aed}
    .stat-value{font-size:1.9rem;font-weight:800;color:#0f2d42;line-height:1}
    .stat-label{font-size:.72rem;color:#7a9ab0;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
    .stat-icon{font-size:1.2rem;margin-bottom:.2rem}
    .stat-card.blue .stat-icon{color:#0f5b8c}
    .stat-card.yellow .stat-icon{color:#f59e0b}
    .stat-card.green .stat-icon{color:#16a34a}
    .stat-card.red .stat-icon{color:#dc2626}
    .stat-card.purple .stat-icon{color:#7c3aed}

    /* ── FILTER / SEARCH ── */
    .filter-bar{display:flex;gap:.6rem;margin-bottom:1.4rem;flex-wrap:wrap;align-items:center;background:white;padding:.8rem 1rem;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .filter-btn{background:#f0f4f8;border:none;padding:.45rem 1.1rem;border-radius:40px;font-weight:600;font-size:.82rem;cursor:pointer;transition:.2s;color:#4a627a;font-family:inherit}
    .filter-btn:hover{background:#e0eaf0;color:#0f5b8c}
    .filter-btn.active{background:#0f5b8c;color:white}
    .search-box{background:#f0f4f8;border:none;padding:.5rem 1rem;border-radius:40px;font-size:.88rem;font-family:inherit;outline:none;transition:.2s;margin-left:auto;width:220px;color:#1e2f3e}
    .search-box:focus{background:#e8f0f8;box-shadow:0 0 0 2px rgba(15,91,140,.15)}

    /* ── GRID LAYOUT FOR CARDS ── */
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:1.2rem}

    /* ── LOAN APPLICATION CARD ── */
    .app-card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.06);transition:.25s;display:flex;flex-direction:column}
    .app-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(15,91,140,.12)}

    /* Card top bar */
    .card-topbar{padding:1rem 1.2rem .8rem;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #f0f4fa}
    .card-topbar.pending{border-left:4px solid #f59e0b}
    .card-topbar.accepted{border-left:4px solid #16a34a}
    .card-topbar.cancelled{border-left:4px solid #dc2626}
    .card-topbar.rejected{border-left:4px solid #dc2626}
    .card-person{display:flex;align-items:center;gap:.7rem}
    .card-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:white;flex-shrink:0}
    .card-avatar.pending{background:linear-gradient(135deg,#f59e0b,#d97706)}
    .card-avatar.accepted{background:linear-gradient(135deg,#16a34a,#15803d)}
    .card-avatar.cancelled,.card-avatar.rejected{background:linear-gradient(135deg,#dc2626,#b91c1c)}
    .card-name{font-size:1rem;font-weight:700;color:#0f2d42;line-height:1.2}
    .card-date{font-size:.72rem;color:#9ab0c0;margin-top:.15rem}
    .card-status{padding:.28rem .8rem;border-radius:40px;font-size:.72rem;font-weight:700;text-transform:uppercase;flex-shrink:0}
    .card-status.pending{background:#fff8e0;color:#d97706}
    .card-status.accepted{background:#dcfce7;color:#16a34a}
    .card-status.cancelled,.card-status.rejected{background:#fee2e2;color:#dc2626}

    /* Card info grid */
    .card-info{padding:.8rem 1.2rem;display:grid;grid-template-columns:1fr 1fr;gap:.5rem .8rem}
    .ci-item{display:flex;flex-direction:column;gap:.15rem}
    .ci-label{font-size:.68rem;font-weight:600;color:#9ab0c0;text-transform:uppercase;letter-spacing:.04em}
    .ci-value{font-size:.88rem;font-weight:600;color:#1e2f3e;word-break:break-all}
    .ci-value.amount{font-size:1rem;font-weight:800;color:#0f5b8c}
    .ci-value.green{color:#16a34a}

    /* NIC photos */
    .card-photos{padding:.6rem 1.2rem;display:flex;gap:.5rem;flex-wrap:wrap}
    .photo-chip{display:flex;align-items:center;gap:.4rem;background:#f0f4fa;border-radius:30px;padding:.3rem .7rem;cursor:pointer;transition:.2s;font-size:.78rem;font-weight:600;color:#0f5b8c;border:1px solid #e0eaf0}
    .photo-chip:hover{background:#0f5b8c;color:white;border-color:#0f5b8c}
    .photo-chip img{width:24px;height:24px;object-fit:cover;border-radius:50%;border:1px solid white}
    .photo-chip i{font-size:.75rem}

    /* Financial panel inside card */
    .card-financial{margin:.2rem 1.2rem .8rem;background:linear-gradient(135deg,#f0f9ff,#f0fff4);border-radius:14px;padding:.8rem 1rem;border:1px solid #d4eaf8}
    .fin-header{font-size:.75rem;font-weight:700;color:#0f5b8c;margin-bottom:.6rem;display:flex;align-items:center;gap:5px}
    .fin-grid-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}
    .fin-mini-item{background:white;border-radius:10px;padding:.5rem .6rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .fin-mini-label{font-size:.62rem;color:#9ab0c0;font-weight:600;margin-bottom:.15rem;text-transform:uppercase}
    .fin-mini-value{font-size:.85rem;font-weight:800;color:#0f2d42}
    .fin-mini-value.red{color:#dc2626}
    .fin-mini-value.green{color:#16a34a}
    .fin-mini-value.orange{color:#d97706}
    .fin-mini-value.blue{color:#0f5b8c}
    .outstanding-pill{background:linear-gradient(95deg,#dc2626,#b91c1c);color:white;border-radius:10px;padding:.55rem .9rem;margin-top:.6rem;display:flex;justify-content:space-between;align-items:center;font-size:.82rem;font-weight:700}
    .outstanding-pill.settled{background:linear-gradient(95deg,#16a34a,#15803d)}
    .late-chip{background:#fff8e0;border:1px solid #fde68a;border-radius:8px;padding:.35rem .7rem;margin-top:.4rem;font-size:.72rem;color:#92400e;font-weight:600;display:flex;align-items:center;gap:5px}

    /* Repayment mini history */
    .repay-mini{margin-top:.5rem}
    .repay-mini-title{font-size:.68rem;font-weight:700;color:#4a627a;margin-bottom:.3rem;display:flex;align-items:center;gap:4px}
    .repay-mini-row{display:flex;justify-content:space-between;align-items:center;padding:.25rem .4rem;border-radius:6px;font-size:.75rem;background:#f8faff;margin-bottom:.2rem}
    .rmr-date{color:#9ab0c0}
    .rmr-amount{font-weight:700;color:#16a34a}

    /* Guarantor block */
    .card-guarantor{margin:0 1.2rem .8rem;background:#f8faff;border-radius:12px;padding:.7rem .9rem;border-left:3px solid #0f5b8c;font-size:.82rem}
    .guarantor-title{font-size:.72rem;font-weight:700;color:#0f5b8c;margin-bottom:.4rem;display:flex;align-items:center;gap:5px}
    .guarantor-grid{display:flex;flex-wrap:wrap;gap:.5rem .8rem;color:#4a627a}
    .guarantor-item{display:flex;align-items:center;gap:4px}
    .guarantor-item i{color:#0f5b8c;font-size:.75rem}

    /* Blacklist tag */
    .bl-tag{margin:.2rem 1.2rem .5rem;background:#fce7f3;border:1px solid #f9a8d4;border-radius:8px;padding:.3rem .7rem;font-size:.75rem;color:#9d174d;font-weight:700;display:flex;align-items:center;gap:5px}

    /* Bank details */
    .card-bank{margin:0 1.2rem .6rem;background:#f0fff4;border-radius:10px;padding:.5rem .8rem;border-left:3px solid #16a34a;font-size:.8rem}
    .bank-row{display:flex;gap:.5rem;color:#4a627a;align-items:center}
    .bank-row i{color:#16a34a;font-size:.75rem}
    .bank-label{color:#9ab0c0;font-size:.7rem}

    /* Action row */
    .card-actions{padding:.8rem 1.2rem;border-top:1px solid #f0f4fa;display:flex;gap:.5rem;flex-wrap:wrap;background:#fafbfd;border-radius:0 0 20px 20px}
    .act-btn{padding:.42rem 1rem;border-radius:40px;font-size:.78rem;font-weight:700;cursor:pointer;border:none;transition:.2s;display:flex;align-items:center;gap:5px;font-family:inherit}
    .act-btn i{font-size:.72rem}
    .btn-accept{background:#dcfce7;color:#16a34a}
    .btn-accept:hover{background:#16a34a;color:white}
    .btn-cancel{background:#fee2e2;color:#dc2626}
    .btn-cancel:hover{background:#dc2626;color:white}
    .btn-pending{background:#fff8e0;color:#d97706}
    .btn-pending:hover{background:#f59e0b;color:white}
    .btn-blacklist{background:#fce7f3;color:#be185d}
    .btn-blacklist:hover{background:#be185d;color:white}
    .btn-delete{background:#f3f4f6;color:#6b7280}
    .btn-delete:hover{background:#6b7280;color:white}

    /* ── REPAY CARDS ── */
    .repay-card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.05);display:flex;flex-direction:column}
    .repay-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(43,155,122,.12)}
    .repay-header{padding:.9rem 1.2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f4fa;border-left:4px solid #e0eaf0}
    .repay-header.pending{border-left-color:#f59e0b}
    .repay-header.accepted{border-left-color:#16a34a}
    .repay-header.cancelled{border-left-color:#dc2626}
    .repay-amount-big{font-size:1.3rem;font-weight:800;color:#16a34a;background:#dcfce7;padding:.3rem .9rem;border-radius:40px}

    /* ── BLACKLIST ── */
    .bl-entry{background:white;border-radius:18px;padding:1.1rem 1.3rem;box-shadow:0 3px 12px rgba(0,0,0,.04);border-left:4px solid #be185d;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;transition:.2s}
    .bl-entry:hover{box-shadow:0 6px 20px rgba(190,24,93,.1)}
    .bl-info .bl-name{font-size:1rem;font-weight:700;color:#0f2d42;display:flex;align-items:center;gap:6px}
    .bl-info .bl-name i{color:#be185d}
    .bl-meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem}
    .bl-chip{display:flex;align-items:center;gap:4px;background:#fdf2f8;padding:.2rem .6rem;border-radius:20px;color:#9d174d;font-size:.78rem;font-weight:600}
    .bl-chip i{font-size:.7rem}
    .bl-reason{display:inline-block;background:#fce7f3;color:#9d174d;padding:.25rem .65rem;border-radius:8px;font-size:.75rem;font-weight:600;margin-top:.4rem}
    .bl-auto{background:#fee2e2;color:#dc2626;font-size:.68rem;padding:.12rem .45rem;border-radius:8px;font-weight:700;margin-left:.3rem}
    .btn-unbl{background:#dcfce7;color:#16a34a;border:none;padding:.42rem 1rem;border-radius:40px;font-size:.78rem;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px;flex-shrink:0;font-family:inherit}
    .btn-unbl:hover{background:#16a34a;color:white}

    /* ── ADD BLACKLIST FORM ── */
    .add-bl-form{background:white;border-radius:18px;padding:1.3rem;box-shadow:0 3px 12px rgba(0,0,0,.04);margin-bottom:1.4rem;border:2px dashed #f9a8d4}
    .add-bl-form h4{color:#be185d;margin-bottom:1rem;font-size:.95rem;display:flex;align-items:center;gap:6px}
    .bl-form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.7rem}
    .bl-form-grid input{width:100%;padding:.65rem .9rem;border:1.5px solid #e0eaf0;border-radius:12px;font-family:inherit;font-size:.88rem;transition:.2s;outline:none}
    .bl-form-grid input:focus{border-color:#be185d}
    .btn-add-bl{background:linear-gradient(95deg,#be185d,#9d174d);color:white;border:none;padding:.65rem 1.4rem;border-radius:40px;font-weight:700;font-size:.88rem;cursor:pointer;display:flex;align-items:center;gap:6px;margin-top:.8rem;font-family:inherit}
    .btn-add-bl:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(190,24,93,.25)}

    /* ── EMPTY / SPINNER ── */
    .empty-state{text-align:center;padding:4rem 2rem;color:#9ab0c0;grid-column:1/-1}
    .empty-state i{font-size:3rem;margin-bottom:1rem;display:block;opacity:.5}
    .empty-state p{font-size:1rem;font-weight:600}
    .spinner{display:flex;justify-content:center;padding:3rem;grid-column:1/-1}
    .spinner i{font-size:2rem;color:#0f5b8c;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── LIGHTBOX ── */
    #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
    #lightbox.show{display:flex}
    #lightbox img{max-width:90vw;max-height:85vh;border-radius:14px;box-shadow:0 30px 60px rgba(0,0,0,.5)}
    #lightboxClose{position:fixed;top:20px;right:24px;color:white;font-size:2rem;cursor:pointer;z-index:10000;background:rgba(0,0,0,.4);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.2s}
    #lightboxClose:hover{background:rgba(255,255,255,.2)}

    /* ── TOAST ── */
    #toast{position:fixed;bottom:24px;right:24px;background:#1e2f3e;color:white;padding:.75rem 1.4rem;border-radius:14px;font-weight:600;font-size:.88rem;z-index:9998;transform:translateY(100px);opacity:0;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.2)}
    #toast.show{transform:translateY(0);opacity:1}
    #toast.success{background:#16a34a}
    #toast.warning{background:#d97706}
    #toast.error{background:#dc2626}

    @media(max-width:900px){
      .sidebar{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;padding:.8rem}
      .sidebar-logo{width:100%;padding:.3rem .5rem .8rem}
      .main-area{margin-left:0}
      .stats-row{grid-template-columns:repeat(2,1fr)}
      .cards-grid{grid-template-columns:1fr}
      .search-box{width:100%;margin-left:0}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🏦 LendEasy</div>
    <div class="login-sub">Admin Panel — Secure Access</div>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    <div class="login-error" id="loginError">⚠️ Invalid username or password</div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <nav class="sidebar">
    <div class="sidebar-logo"><i class="fas fa-chart-line" style="color:#2b9b7a"></i> Lend<span>Easy</span> Admin</div>
    <button class="nav-item active" data-view="applications"><i class="fas fa-file-invoice-dollar"></i> Applications <span class="badge" id="pendingBadge" style="display:none">0</span></button>
    <button class="nav-item" data-view="repayments"><i class="fas fa-money-bill-wave"></i> Repayments <span class="badge green" id="repayPendingBadge" style="display:none">0</span></button>
    <button class="nav-item" data-view="blacklist"><i class="fas fa-ban"></i> Blacklist <span class="badge" id="blacklistBadge" style="display:none">0</span></button>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </nav>

  <div class="main-area">
    <div class="topbar">
      <div class="page-title" id="pageTitle">📋 Loan Applications</div>
      <div class="live-dot">Live Data</div>
    </div>

    <!-- STATS ROW -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card blue"><i class="fas fa-file-alt stat-icon"></i><div class="stat-value" id="sTotalApps">0</div><div class="stat-label">Total Applications</div></div>
      <div class="stat-card yellow"><i class="fas fa-clock stat-icon"></i><div class="stat-value" id="sPending">0</div><div class="stat-label">Pending</div></div>
      <div class="stat-card green"><i class="fas fa-check-circle stat-icon"></i><div class="stat-value" id="sAccepted">0</div><div class="stat-label">Accepted</div></div>
      <div class="stat-card red"><i class="fas fa-times-circle stat-icon"></i><div class="stat-value" id="sCancelled">0</div><div class="stat-label">Cancelled</div></div>
      <div class="stat-card purple"><i class="fas fa-ban stat-icon"></i><div class="stat-value" id="sBlacklisted">0</div><div class="stat-label">Blacklisted</div></div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">⏳ Pending</button>
      <button class="filter-btn" data-filter="accepted">✅ Accepted</button>
      <button class="filter-btn" data-filter="cancelled">❌ Cancelled</button>
      <input class="search-box" id="searchBox" placeholder="🔍 Search name or NIC...">
    </div>

    <!-- CARDS GRID -->
    <div class="cards-grid" id="cardsList">
      <div class="spinner"><i class="fas fa-circle-notch"></i></div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="lightboxClose"><i class="fas fa-times"></i></span>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
  import { initializeApp }                                   from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDlNPMm6sEQlQ-UTsrFrKiGIwBIyyYjI-g",
    authDomain: "loansale-site.firebaseapp.com",
    projectId: "loansale-site",
    storageBucket: "loansale-site.firebasestorage.app",
    messagingSenderId: "35285094302",
    appId: "1:35285094302:web:e5dae614a7017b6f0e508f",
    databaseURL: "https://loansale-site-default-rtdb.firebaseio.com"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const ADMIN_USER = "admin";
  const ADMIN_PASS = "lendeasy2025";

  let allApps      = [];
  let allRepays    = [];
  let allBlacklist = [];
  let currentView  = 'applications';
  let filterStatus = 'all';
  let searchQuery  = '';

  // ── LOGIN ────────────────────────────────────────────────────────
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  function doLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value.trim();
    if(u===ADMIN_USER && p===ADMIN_PASS){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('adminApp').style.display='block';
      initListeners();
    } else {
      document.getElementById('loginError').style.display='block';
    }
  }
  document.getElementById('logoutBtn').addEventListener('click',()=>{
    document.getElementById('adminApp').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('loginUser').value='';
    document.getElementById('loginPass').value='';
  });

  // ── FIREBASE LISTENERS ────────────────────────────────────────────
  function initListeners() {
    onValue(ref(db,'loan_applications'), snap => {
      allApps = [];
      snap.forEach(child => { allApps.push({ id:child.key, ...child.val() }); });
      allApps.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
      updateStats();
      checkAutoBlacklist();
      if(currentView==='applications') renderList();
    });
    onValue(ref(db,'loan_repayments'), snap => {
      allRepays = [];
      snap.forEach(child => { allRepays.push({ id:child.key, ...child.val() }); });
      allRepays.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
      updateRepayBadge();
      if(currentView==='repayments') renderList();
      if(currentView==='applications') renderList();
    });
    onValue(ref(db,'blacklist'), snap => {
      allBlacklist = [];
      snap.forEach(child => { allBlacklist.push({ id:child.key, ...child.val() }); });
      updateBlacklistBadge();
      if(currentView==='blacklist') renderList();
    });
  }

  // ── FINANCIAL CALC ────────────────────────────────────────────────
  function calcFinancials(loan) {
    if (loan.status !== 'accepted' || !loan.approvedDate) return null;
    const MS_DAY      = 86400000;
    const now         = Date.now();
    const principal   = parseFloat(loan.loanAmount) || 0;
    const daysSince   = Math.floor((now - loan.approvedDate) / MS_DAY);
    const months      = Math.max(1, Math.ceil(daysSince / 30));
    const interest    = principal * 0.015 * months;
    const totalDue    = principal + interest;
    const loanRepays  = allRepays.filter(r =>
      r.status === 'accepted' &&
      r.nicNumber && loan.nicNumber &&
      r.nicNumber.toLowerCase() === loan.nicNumber.toLowerCase()
    );
    const totalPaid   = loanRepays.reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
    const outstanding = Math.max(0, totalDue - totalPaid);
    const daysLate    = outstanding > 0 ? Math.max(0, daysSince - 30) : 0;
    const lateFee     = daysLate * 100;
    const totalOut    = outstanding + lateFee;
    const isSettled   = totalOut <= 0;
    return { principal, interest, totalDue, months, daysSince, totalPaid, daysLate, lateFee, totalOut, isSettled, loanRepays };
  }

  // ── AUTO BLACKLIST ────────────────────────────────────────────────
  async function checkAutoBlacklist() {
    for (const loan of allApps) {
      if (loan.status !== 'accepted' || !loan.approvedDate) continue;
      if ((Date.now() - loan.approvedDate) < 90 * 86400000) continue;
      const fin = calcFinancials(loan);
      if (!fin || fin.totalPaid > 0) continue;
      const already = allBlacklist.some(b =>
        b.nicNumber && loan.nicNumber && b.nicNumber.toLowerCase() === loan.nicNumber.toLowerCase()
      );
      if (already) continue;
      try {
        await push(ref(db,'blacklist'),{
          name: loan.fullName||'—', nicNumber: loan.nicNumber||'—', phone: loan.applicantPhone||'—',
          reason:'No payment for 3+ months (auto-blacklisted)', addedDate: Date.now(), loanId: loan.id, autoAdded: true
        });
        showToast(`⚠️ ${loan.fullName} auto-blacklisted`, 'warning');
      } catch(e){}
    }
  }

  // ── STATS ────────────────────────────────────────────────────────
  function updateStats() {
    const pending   = allApps.filter(a=>a.status==='pending').length;
    const accepted  = allApps.filter(a=>a.status==='accepted').length;
    const cancelled = allApps.filter(a=>a.status==='cancelled').length;
    document.getElementById('sTotalApps').textContent = allApps.length;
    document.getElementById('sPending').textContent   = pending;
    document.getElementById('sAccepted').textContent  = accepted;
    document.getElementById('sCancelled').textContent = cancelled;
    document.getElementById('sBlacklisted').textContent = allBlacklist.length;
    const pb = document.getElementById('pendingBadge');
    pb.textContent = pending; pb.style.display = pending > 0 ? 'inline' : 'none';
  }
  function updateRepayBadge() {
    const pending = allRepays.filter(r=>r.status==='pending').length;
    const rb = document.getElementById('repayPendingBadge');
    rb.textContent = pending; rb.style.display = pending > 0 ? 'inline' : 'none';
  }
  function updateBlacklistBadge() {
    const bb = document.getElementById('blacklistBadge');
    bb.textContent = allBlacklist.length; bb.style.display = allBlacklist.length > 0 ? 'inline' : 'none';
    document.getElementById('sBlacklisted').textContent = allBlacklist.length;
  }

  // ── NAV ──────────────────────────────────────────────────────────
  document.querySelectorAll('[data-view]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('[data-view]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.getAttribute('data-view');
      filterStatus = 'all'; searchQuery = '';
      const sb = document.getElementById('searchBox'); if(sb) sb.value='';
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active', b.getAttribute('data-filter')==='all'));
      const isApps = currentView==='applications';
      const isBL   = currentView==='blacklist';
      document.getElementById('statsRow').style.display  = isApps ? 'grid' : 'none';
      document.getElementById('filterBar').style.display = isBL   ? 'none' : 'flex';
      document.getElementById('pageTitle').textContent   =
        isApps ? '📋 Loan Applications' : currentView==='repayments' ? '💰 Loan Repayments' : '🚫 Blacklist Management';
      renderList();
    });
  });

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterStatus = btn.getAttribute('data-filter');
      renderList();
    });
  });
  document.getElementById('searchBox').addEventListener('input', e=>{ searchQuery = e.target.value.toLowerCase(); renderList(); });

  // ── RENDER ───────────────────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('cardsList');
    if (currentView === 'blacklist') { renderBlacklist(list); return; }
    let data = currentView==='applications' ? allApps : allRepays;
    if(currentView==='applications' && filterStatus!=='all') data = data.filter(a=>a.status===filterStatus);
    if(searchQuery) data = data.filter(a=>
      (a.fullName||'').toLowerCase().includes(searchQuery) ||
      (a.nicNumber||'').toLowerCase().includes(searchQuery)
    );
    if(data.length===0){ list.innerHTML=`<div class="empty-state"><i class="fas fa-inbox"></i><p>No records found</p></div>`; return; }
    list.innerHTML = data.map(item => currentView==='applications' ? appCard(item) : repayCard(item)).join('');
  }

  // ── FORMAT ───────────────────────────────────────────────────────
  const fmtAmt = v => 'LKR ' + Math.round(v).toLocaleString();
  const initials = name => (name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

  // ── APPLICATION CARD ─────────────────────────────────────────────
  function appCard(a) {
    const status  = a.status || 'pending';
    const date    = a.timestamp ? new Date(a.timestamp).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const fin     = calcFinancials(a);
    const isInBL  = allBlacklist.some(b=>b.nicNumber && a.nicNumber && b.nicNumber.toLowerCase()===a.nicNumber.toLowerCase());

    // ── Financial block ──────────────────────────────────────────
    let finHtml = '';
    if (fin) {
      const repayRows = fin.loanRepays.length > 0
        ? `<div class="repay-mini"><div class="repay-mini-title"><i class="fas fa-history"></i> Confirmed Payments</div>
          ${fin.loanRepays.map(r=>`<div class="repay-mini-row"><span class="rmr-date">${r.timestamp ? new Date(r.timestamp).toLocaleDateString() : '—'}</span><span class="rmr-amount">+ ${fmtAmt(r.amount||0)}</span></div>`).join('')}
        </div>` : '';
      const lateHtml = fin.lateFee > 0 ? `<div class="late-chip"><i class="fas fa-exclamation-triangle"></i> ${fin.daysLate} days overdue — Late fee: ${fmtAmt(fin.lateFee)}</div>` : '';
      finHtml = `<div class="card-financial">
        <div class="fin-header"><i class="fas fa-calculator"></i> Financial Summary — ${fin.months} month${fin.months!==1?'s':''} (${fin.daysSince} days)</div>
        <div class="fin-grid-mini">
          <div class="fin-mini-item"><div class="fin-mini-label">Principal</div><div class="fin-mini-value blue">${fmtAmt(fin.principal)}</div></div>
          <div class="fin-mini-item"><div class="fin-mini-label">Interest</div><div class="fin-mini-value orange">${fmtAmt(fin.interest)}</div></div>
          <div class="fin-mini-item"><div class="fin-mini-label">Paid</div><div class="fin-mini-value green">${fmtAmt(fin.totalPaid)}</div></div>
        </div>
        <div class="outstanding-pill ${fin.isSettled ? 'settled' : ''}">
          ${fin.isSettled
            ? '<span><i class="fas fa-check-circle"></i> LOAN FULLY SETTLED</span><span>✅</span>'
            : `<span>Outstanding Balance</span><span>${fmtAmt(fin.totalOut)}</span>`}
        </div>
        ${lateHtml}
        ${repayRows}
      </div>`;
    } else if (status === 'accepted') {
      finHtml = `<div class="card-financial"><div class="fin-header" style="color:#d97706"><i class="fas fa-exclamation-triangle"></i> No approval date recorded. Re-accept to set start date.</div></div>`;
    }

    // ── Guarantor block ──────────────────────────────────────────
    const gHtml = a.hasGuarantor && a.guarantor ? `
      <div class="card-guarantor">
        <div class="guarantor-title"><i class="fas fa-user-shield"></i> Guarantor</div>
        <div class="guarantor-grid">
          <span class="guarantor-item"><i class="fas fa-user"></i> ${a.guarantor.name||'—'}</span>
          <span class="guarantor-item"><i class="fas fa-id-card"></i> ${a.guarantor.idNumber||'—'}</span>
          <span class="guarantor-item"><i class="fas fa-phone"></i> ${a.guarantor.phone||'—'}</span>
        </div>
        ${a.guarantor.idPhotoImg ? `<div style="margin-top:.4rem"><span class="photo-chip" onclick="showImg('${a.guarantor.idPhotoImg}')"><i class="fas fa-id-badge"></i> View ID</span></div>` : ''}
      </div>` : '';

    // ── Bank details ─────────────────────────────────────────────
    const bankHtml = a.bankDetails ? `
      <div class="card-bank">
        <div class="bank-row"><i class="fas fa-university"></i> <span>${a.bankDetails.bankName||'—'}</span> <span class="bank-label">— ${a.bankDetails.bankBranch||'—'}</span></div>
        <div class="bank-row" style="margin-top:.2rem"><i class="fas fa-hashtag"></i> <span style="font-family:monospace;font-size:.82rem">${a.bankDetails.accountNumber||'—'}</span></div>
      </div>` : '';

    const blTag = isInBL ? `<div class="bl-tag"><i class="fas fa-ban"></i> This person is on the BLACKLIST</div>` : '';
    const approvedStr = a.approvedDate ? ` · Approved: ${new Date(a.approvedDate).toLocaleDateString()}` : '';

    return `
    <div class="app-card" id="entry-${a.id}">
      <div class="card-topbar ${status}">
        <div class="card-person">
          <div class="card-avatar ${status}">${initials(a.fullName)}</div>
          <div>
            <div class="card-name">${a.fullName||'—'}</div>
            <div class="card-date">${date}${approvedStr}</div>
          </div>
        </div>
        <span class="card-status ${status}">${status.toUpperCase()}</span>
      </div>

      <div class="card-info">
        <div class="ci-item"><div class="ci-label">NIC</div><div class="ci-value">${a.nicNumber||'—'}</div></div>
        <div class="ci-item"><div class="ci-label">Phone</div><div class="ci-value">${a.applicantPhone||'—'}</div></div>
        <div class="ci-item"><div class="ci-label">Loan Amount</div><div class="ci-value amount">${fmtAmt(a.loanAmount||0)}</div></div>
        <div class="ci-item"><div class="ci-label">Address</div><div class="ci-value">${(a.address||'—').substring(0,40)}</div></div>
      </div>

      <div class="card-photos">
        ${a.nicFrontImg ? `<span class="photo-chip" onclick="showImg('${a.nicFrontImg}')"><i class="fas fa-id-card"></i> NIC Front</span>` : ''}
        ${a.nicBackImg  ? `<span class="photo-chip" onclick="showImg('${a.nicBackImg}')"><i class="fas fa-id-card"></i> NIC Back</span>` : ''}
      </div>

      ${bankHtml}
      ${gHtml}
      ${finHtml}
      ${blTag}

      <div class="card-actions">
        <button class="act-btn btn-accept"    onclick="setStatus('${a.id}','accepted')"><i class="fas fa-check"></i> Accept</button>
        <button class="act-btn btn-cancel"    onclick="setStatus('${a.id}','cancelled')"><i class="fas fa-times"></i> Cancel</button>
        <button class="act-btn btn-pending"   onclick="setStatus('${a.id}','pending')"><i class="fas fa-clock"></i> Pending</button>
        <button class="act-btn btn-blacklist" onclick="manualBlacklist('${a.id}')"><i class="fas fa-ban"></i> Blacklist</button>
        <button class="act-btn btn-delete"    onclick="deleteEntry('${a.id}','loan_applications')"><i class="fas fa-trash"></i> Delete</button>
      </div>
    </div>`;
  }

  // ── REPAYMENT CARD ────────────────────────────────────────────────
  function repayCard(r) {
    const status = r.status || 'pending';
    const date   = r.timestamp ? new Date(r.timestamp).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    return `
    <div class="repay-card" id="entry-${r.id}">
      <div class="repay-header ${status}">
        <div>
          <div style="font-weight:700;font-size:1rem;color:#0f2d42">${r.fullName||'—'}</div>
          <div style="font-size:.75rem;color:#9ab0c0;margin-top:.15rem">${date}</div>
        </div>
        <div style="display:flex;align-items:center;gap:.6rem">
          <span class="repay-amount-big">${fmtAmt(r.amount||0)}</span>
          <span class="card-status ${status}">${status.toUpperCase()}</span>
        </div>
      </div>
      <div class="card-info">
        <div class="ci-item"><div class="ci-label">NIC</div><div class="ci-value">${r.nicNumber||'—'}</div></div>
        <div class="ci-item"><div class="ci-label">Phone</div><div class="ci-value">${r.phoneNumber||'—'}</div></div>
      </div>
      ${r.receiptImg ? `<div class="card-photos"><span class="photo-chip" onclick="showImg('${r.receiptImg}')"><i class="fas fa-receipt"></i> View Receipt</span></div>` : ''}
      <div class="card-actions">
        <button class="act-btn btn-accept" onclick="setRepayStatus('${r.id}','accepted')"><i class="fas fa-check"></i> Confirm</button>
        <button class="act-btn btn-cancel" onclick="setRepayStatus('${r.id}','cancelled')"><i class="fas fa-times"></i> Reject</button>
        <button class="act-btn btn-delete" onclick="deleteEntry('${r.id}','loan_repayments')"><i class="fas fa-trash"></i> Delete</button>
      </div>
    </div>`;
  }

  // ── BLACKLIST ─────────────────────────────────────────────────────
  function renderBlacklist(list) {
    const filtered = searchQuery
      ? allBlacklist.filter(b=>(b.name||'').toLowerCase().includes(searchQuery)||(b.nicNumber||'').toLowerCase().includes(searchQuery)||(b.phone||'').toLowerCase().includes(searchQuery))
      : allBlacklist;

    const addForm = `
      <div class="add-bl-form" style="grid-column:1/-1">
        <h4><i class="fas fa-user-slash"></i> Manually Blacklist a Person</h4>
        <div class="bl-form-grid">
          <input type="text"  id="blName"   placeholder="Full Name *">
          <input type="text"  id="blNic"    placeholder="NIC Number *">
          <input type="text"  id="blPhone"  placeholder="Phone Number">
          <input type="text"  id="blReason" placeholder="Reason">
        </div>
        <button class="btn-add-bl" onclick="addToBlacklist()"><i class="fas fa-ban"></i> Add to Blacklist</button>
      </div>
      <div style="grid-column:1/-1;display:flex;gap:.7rem;margin-bottom:.5rem;flex-wrap:wrap;align-items:center">
        <span style="font-weight:700;color:#9d174d"><i class="fas fa-ban"></i> ${filtered.length} person${filtered.length!==1?'s':''} blacklisted</span>
        <input class="search-box" style="margin-left:auto" placeholder="🔍 Search blacklist..." oninput="searchQuery=this.value.toLowerCase();renderList()">
      </div>`;

    if (filtered.length === 0) {
      list.innerHTML = addForm + `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-shield-alt"></i><p>No blacklisted persons</p></div>`;
      return;
    }

    list.innerHTML = addForm + filtered.map(b=>{
      const date = b.addedDate ? new Date(b.addedDate).toLocaleDateString() : '—';
      return `
      <div class="bl-entry" id="bl-${b.id}">
        <div class="bl-info">
          <div class="bl-name"><i class="fas fa-user-slash"></i> ${b.name||'—'} ${b.autoAdded ? '<span class="bl-auto">AUTO</span>' : ''}</div>
          <div class="bl-meta">
            <span class="bl-chip"><i class="fas fa-id-card"></i> ${b.nicNumber||'—'}</span>
            <span class="bl-chip"><i class="fas fa-phone"></i> ${b.phone||'—'}</span>
            <span class="bl-chip"><i class="fas fa-calendar"></i> ${date}</span>
          </div>
          <span class="bl-reason"><i class="fas fa-exclamation-circle"></i> ${b.reason||'Not specified'}</span>
        </div>
        <button class="btn-unbl" onclick="removeBlacklist('${b.id}','${(b.name||'').replace(/'/g,"\\'")}')">
          <i class="fas fa-user-check"></i> Remove
        </button>
      </div>`;
    }).join('');
  }

  // ── ACTIONS ──────────────────────────────────────────────────────
  window.setStatus = async (id, status) => {
    const updates = { status };
    if (status === 'accepted') {
      const existing = allApps.find(a=>a.id===id);
      if (existing && !existing.approvedDate) updates.approvedDate = Date.now();
    }
    await update(ref(db,`loan_applications/${id}`), updates);
    showToast(`Marked as ${status}`, status==='accepted' ? 'success' : '');
  };
  window.setRepayStatus = async (id, status) => {
    await update(ref(db,`loan_repayments/${id}`), { status });
    showToast(status==='accepted' ? 'Payment confirmed ✅' : 'Payment rejected', status==='accepted' ? 'success' : 'error');
  };
  window.deleteEntry = async (id, path) => {
    if(!confirm('Delete this record permanently?')) return;
    await remove(ref(db,`${path}/${id}`));
    showToast('Record deleted');
  };
  window.manualBlacklist = async (loanId) => {
    const loan = allApps.find(a=>a.id===loanId);
    if (!loan) return;
    const already = allBlacklist.some(b=>b.nicNumber&&loan.nicNumber&&b.nicNumber.toLowerCase()===loan.nicNumber.toLowerCase());
    if (already) { showToast('Already blacklisted','warning'); return; }
    if(!confirm(`Blacklist ${loan.fullName}?`)) return;
    await push(ref(db,'blacklist'),{
      name:loan.fullName||'—', nicNumber:loan.nicNumber||'—', phone:loan.applicantPhone||'—',
      reason:'Manually blacklisted by admin', addedDate:Date.now(), loanId:loan.id, autoAdded:false
    });
    showToast(`${loan.fullName} blacklisted`, 'warning');
  };
  window.addToBlacklist = async () => {
    const name=document.getElementById('blName').value.trim(), nic=document.getElementById('blNic').value.trim();
    const phone=document.getElementById('blPhone').value.trim(), reason=document.getElementById('blReason').value.trim();
    if(!name||!nic){ showToast('Name and NIC required','error'); return; }
    await push(ref(db,'blacklist'),{ name, nicNumber:nic, phone, reason:reason||'Manually blacklisted', addedDate:Date.now(), autoAdded:false });
    document.getElementById('blName').value=document.getElementById('blNic').value=document.getElementById('blPhone').value=document.getElementById('blReason').value='';
    showToast(`${name} added to blacklist`,'warning');
  };
  window.removeBlacklist = async (id, name) => {
    if(!confirm(`Remove ${name} from blacklist?`)) return;
    await remove(ref(db,`blacklist/${id}`));
    showToast(`${name} removed`,'success');
  };

  // ── LIGHTBOX ─────────────────────────────────────────────────────
  window.showImg = url => { document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('show'); };
  document.getElementById('lightboxClose').addEventListener('click',()=>document.getElementById('lightbox').classList.remove('show'));
  document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('show'); });

  // ── TOAST ────────────────────────────────────────────────────────
  function showToast(msg, type='') {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className=`show${type?' '+type:''}`;
    setTimeout(()=>t.className='', 2800);
  }
</script>
</body>
</html>
